<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./styles.css" />
		<script src="./script.js" type="module"></script>
	</head>

	<body>
		<main id="container">
			<header id="main-header" class="dark box">
				<div id="photo">
					<img src="" />
				</div>

				<div>
					<h1 id="full-name"></h1>
					<h3 id="role-title"></h3>
					<p>
						<img
							src="./assets/house-fill.svg"
							alt=""
							class="logo"
						/><a id="location" href="" target="_blank"></a>
					</p>

					<div id="contact-info" class="box">
						<p>
							<img
								src="./assets/phone.svg"
								alt=""
								class="logo"
							/><a id="phone" href="" target="_blank"></a><span class="contact-separator">&nbsp;|&nbsp;</span>
						</p>
						<p>
							<img
								src="./assets/mail-inbox.svg"
								alt=""
								class="logo"
							/><a id="email" href="" target="_blank"></a><span class="contact-separator">&nbsp;|&nbsp;</span>
						</p>
						<p>
							<img
								src="./assets/linkedin.svg"
								alt=""
								class="logo"
							/><a id="linkedin" href="" target="_blank"></a><span class="contact-separator">&nbsp;|&nbsp;</span>
						</p>
						<p>
							<img
								src="./assets/github.svg"
								alt=""
								class="logo"
							/><a id="github" href="" target="_blank"></a>
						</p>
					</div>
				</div>
			</header>
			<section id="main">
				<div id="profile-header" class="header mid-dark box">
					PERFIL PROFESIONAL
				</div>
				<div id="profile" class="content box"></div>

				<div id="experience-header" class="header mid-dark box">
					EXPERIENCIA LABORAL
				</div>
				<div id="experience" class="content box"></div>

				<div id="courses-header" class="header mid-dark box">
					FORMACIÓN Y CERTIFICACIONES
				</div>
				<div id="courses" class="content box"></div>

				<div id="education-header" class="header mid-dark box">
					EDUCACIÓN
				</div>
				<div id="education" class="content box"></div>
			</section>

			<footer class="dark box">
				<div id="competencies-header" class="content box">
					<div class="header title">COMPETENCIAS TÉCNICAS</div>
					<div id="tools"></div>
				</div>

				<div id="languages-info" class="content box">
					<div class="header title">IDIOMAS</div>
					<div id="languages"></div>
				</div>
			</footer>
		</main>
	</body>
</html>
